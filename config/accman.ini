[ldap]
host = ldap.example.com
port = 636
tls = true
; ca_cert = /etc/ssl/certs/ca.pem

[admin]
bind_dn = cn=admin,dc=example,dc=com

[pam]
base_dn = ou=people,dc=example,dc=com

[mail]
base_dn = ou=mail,dc=example,dc=com

[template:pam_user]
name = PAMユーザ
scope = pam
rdn_attr = uid
object_classes = posixAccount, shadowAccount

[template:pam_user:uid]
label = ユーザID
required = true
multi = false
type = text

[template:pam_user:cn]
label = 表示名
required = true
multi = false
type = text

[template:pam_user:userPassword]
label = パスワード
required = true
multi = false
type = password

[template:pam_user:uidNumber]
label = UID番号
required = true
multi = false
type = number

[template:pam_user:gidNumber]
label = GID番号
required = true
multi = false
type = number

[template:pam_user:homeDirectory]
label = ホームディレクトリ
required = true
multi = false
type = text

[template:pam_user:loginShell]
label = ログインシェル
required = true
multi = false
type = text

[template:pam_group]
name = PAMグループ
scope = pam
rdn_attr = cn
object_classes = posixGroup

[template:pam_group:cn]
label = グループ名
required = true
multi = false
type = text

[template:pam_group:gidNumber]
label = GID番号
required = true
multi = false
type = number

[template:pam_group:memberUid]
label = メンバー
required = false
multi = true
type = text

[template:sudoer]
name = Sudoer
scope = pam
rdn_attr = cn
object_classes = sudoRole

[template:sudoer:cn]
label = ルール名
required = true
multi = false
type = text

[template:sudoer:sudoUser]
label = 対象ユーザ／グループ
required = true
multi = true
type = text

[template:sudoer:sudoHost]
label = 対象ホスト
required = true
multi = true
type = text

[template:sudoer:sudoCommand]
label = 許可コマンド
required = true
multi = true
type = text

[template:sudoer:sudoOption]
label = オプション
required = false
multi = true
type = text

[template:mail_user]
name = メールユーザ
scope = mail
rdn_attr = uid
object_classes = inetOrgPerson

[template:mail_user:uid]
label = メールアカウントID
required = true
multi = false
type = text

[template:mail_user:mail]
label = メールアドレス
required = true
multi = true
type = text

[template:mail_user:userPassword]
label = パスワード
required = true
multi = false
type = password
