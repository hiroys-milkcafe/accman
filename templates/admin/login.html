{% extends "base.html" %}
{% block title %}管理者ログイン — accman{% endblock %}
{% block content %}
<div class="login-box">
  <h2>管理者ログイン</h2>
  <form method="post" action="{{ url_for('auth.admin_login') }}">
    <div class="field">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" required autofocus>
    </div>
    <div class="field">
      <button type="submit" class="btn-primary">ログイン</button>
    </div>
  </form>
  <p class="alt-login"><a href="{{ url_for('auth.login') }}">一般ユーザログイン</a></p>
</div>
{% endblock %}
